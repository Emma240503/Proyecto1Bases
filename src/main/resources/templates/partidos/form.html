<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Partido')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4" style="max-width: 600px;">

    <!-- Cabecera -->
    <div class="d-flex align-items-center mb-4">
        <a th:href="${quinielaId != null
                      ? '/admin/quinielas/' + quinielaId
                      : '/admin/partidos'}"
           class="btn btn-sm btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h3 class="fw-bold mb-0">
            <i class="bi bi-calendar3 text-success me-2"></i>
            <!-- Modo resultado -->
            <span th:if="${modoResultado}">Actualizar Resultado</span>
            <!-- Modo creación -->
            <span th:unless="${modoResultado}">Nuevo Partido</span>
        </h3>
    </div>

    <!-- Mensajes -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <!-- ── MODO ACTUALIZAR RESULTADO ─────────────────── -->
            <div th:if="${modoResultado}">
                <p class="mb-3">
                    <span class="fw-bold text-primary" th:text="${partido.equipoLocal}"></span>
                    <span class="mx-2">vs</span>
                    <span class="fw-bold text-primary" th:text="${partido.equipoVisitante}"></span>
                </p>

                <form th:action="@{/admin/partidos/{id}/resultado(id=${partido.idPartido})}"
                      method="post">
                    <input type="hidden" name="quinielaId" th:value="${quinielaId}"/>

                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold"
                                   th:text="'Goles ' + ${partido.equipoLocal}">Goles Local</label>
                            <input type="number" class="form-control form-control-lg text-center"
                                   name="golesLocal" min="0" max="99"
                                   th:value="${partido.golesLocal}" required/>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold"
                                   th:text="'Goles ' + ${partido.equipoVisitante}">Goles Visitante</label>
                            <input type="number" class="form-control form-control-lg text-center"
                                   name="golesVisitante" min="0" max="99"
                                   th:value="${partido.golesVisitante}" required/>
                        </div>
                        <div class="col-12 d-flex gap-2 pt-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle me-1"></i>Guardar Resultado
                            </button>
                            <a th:href="${quinielaId != null
                                          ? '/admin/quinielas/' + quinielaId
                                          : '/admin/partidos'}"
                               class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </div>
                </form>
            </div>

            <!-- ── MODO CREAR PARTIDO ────────────────────────── -->
            <div th:unless="${modoResultado}">
                <form th:action="@{/admin/partidos}" th:object="${partido}" method="post">

                    <!-- quinielaId viene de la URL para asociar el partido -->
                    <input type="hidden" name="quinielaId"
                           th:value="${quinielaIdSeleccionada}"/>

                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label fw-semibold">Quiniela asociada</label>
                            <select class="form-select" name="quinielaId">
                                <option value="">-- Sin quiniela --</option>
                                <option th:each="q : ${quinielas}"
                                        th:value="${q.idQuiniela}"
                                        th:text="${q.nombre}"
                                        th:selected="${q.idQuiniela == quinielaIdSeleccionada}">
                                </option>
                            </select>
                            <small class="text-muted">
                                El partido se asociará a esta quiniela en QUINIELA_PARTIDO.
                            </small>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Equipo Local *</label>
                            <input type="text" class="form-control"
                                   th:field="*{equipoLocal}" required
                                   placeholder="Ej: Real Madrid"/>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Equipo Visitante *</label>
                            <input type="text" class="form-control"
                                   th:field="*{equipoVisitante}" required
                                   placeholder="Ej: Barcelona"/>
                        </div>

                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Fecha y Hora *</label>
                            <input type="datetime-local" class="form-control"
                                   th:field="*{fechaHora}" required/>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Estado</label>
                            <select class="form-select" th:field="*{estado}">
                                <option value="PENDIENTE" selected>PENDIENTE</option>
                                <option value="EN_JUEGO">EN_JUEGO</option>
                                <option value="FINALIZADO">FINALIZADO</option>
                            </select>
                        </div>

                        <div class="col-12 d-flex gap-2 pt-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-save me-1"></i>Crear Partido
                            </button>
                            <a th:href="${quinielaIdSeleccionada != null
                                          ? '/admin/quinielas/' + quinielaIdSeleccionada
                                          : '/admin/partidos'}"
                               class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>

                    </div>
                </form>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

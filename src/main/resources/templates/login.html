<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Iniciar Sesión')}"></head>
<style>
    body {
        background-image: url('https://nuevaya.com.ni/wp-content/uploads/2024/02/clubs-de-futbol-de-costa-rica.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 0;
    }
    .card {
        position: relative;
        z-index: 1;
    }
</style>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="card shadow" style="width: 100%; max-width: 420px;">
    <div class="card-header bg-primary text-white text-center py-3">
        <h4 class="mb-0">
            <img src="https://media.giphy.com/media/KFPrlCarpIKgj5suYj/giphy.gif"
                 height="32" width="32" style="object-fit:contain;" alt=""/>QuinielaFútbol
        </h4>
        <small>Inicia sesión para continuar</small>
    </div>

    <div class="card-body p-4">

        <!-- Mensajes flash -->
        <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-1"></i>Has cerrado sesión correctamente.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i>Usuario o contraseña incorrectos.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-1"></i>
            <span th:text="${mensaje}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Formulario — Spring Security procesa el POST /login -->
        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">
                    <i class="bi bi-person me-1"></i>Usuario
                </label>
                <input type="text" class="form-control" id="username"
                       name="username" placeholder="Tu nombre de usuario"
                       required autofocus/>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">
                    <i class="bi bi-lock me-1"></i>Contraseña
                </label>
                <input type="password" class="form-control" id="password"
                       name="password" placeholder="Tu contraseña" required/>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar Sesión
            </button>
        </form>

    </div>

    <div class="card-footer text-center py-3">
        ¿No tienes cuenta?
        <a th:href="@{/registro}" class="fw-semibold">Regístrate aquí</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

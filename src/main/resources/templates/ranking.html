<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Ranking')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4" style="max-width: 700px;">

    <!-- Cabecera -->
    <div class="d-flex align-items-center mb-4">
        <a sec:authorize="hasRole('ADMINISTRADOR')"
           th:href="@{/admin/quinielas}" class="btn btn-sm btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <a sec:authorize="hasRole('JUGADOR')"
           th:href="@{/jugador/quinielas}" class="btn btn-sm btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h3 class="fw-bold mb-0">
            <img th:src="@{/images/herediano.png}" width="80" height="80" style="object-fit:contain;vertical-align:middle;" alt="Herediano" class="me-2"/>Ranking
        </h3>
    </div>

    <!-- Info quiniela -->
    <div class="card border-0 bg-warning bg-opacity-10 border-warning mb-4">
        <div class="card-body py-3">
            <h5 class="fw-bold mb-0 text-warning">
                <i class="bi bi-list-stars me-1"></i>
                <span th:text="${quiniela.nombre}">Quiniela</span>
            </h5>
            <small class="text-muted" th:text="${quiniela.descripcion}"></small>
        </div>
    </div>

    <!-- Tabla ranking -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th style="width:70px;" class="text-center">Pos.</th>
                            <th>Jugador</th>
                            <th>Usuario</th>
                            <th class="text-center">Puntos</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="fila, stat : ${ranking}">
                            <!-- Posición con íconos para top 3 -->
                            <td class="text-center ranking-pos">
                                <span th:if="${stat.index == 0}">
                                    <img th:src="@{/images/herediano.png}" width="40" height="40" style="object-fit:contain" alt="1°"/>
                                </span>
                                <span th:if="${stat.index == 1}" class="text-secondary fs-5">
                                    <i class="bi bi-award-fill"></i>
                                </span>
                                <span th:if="${stat.index == 2}" class="text-danger fs-5">
                                    <i class="bi bi-award-fill"></i>
                                </span>
                                <span th:if="${stat.index > 2}" th:text="${stat.count}">4</span>
                            </td>
                            <td>
                                <!-- Resalta tu propia fila -->
                                <strong th:text="${fila.nombre_completo}">Nombre</strong>
                            </td>
                            <td>
                                <span class="text-muted" th:text="${'@' + fila.username}">@usuario</span>
                            </td>
                            <td class="text-center">
                                <span class="badge bg-primary rounded-pill fs-6"
                                      th:text="${fila.puntos_totales}">0</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(ranking)}">
                            <td colspan="4" class="text-center text-muted py-5">
                                <i class="bi bi-hourglass-split fs-2 d-block mb-2"></i>
                                Aún no hay puntuaciones registradas.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <p class="text-muted small text-center mt-3">
        Las puntuaciones se actualizan automáticamente al ingresar resultados de partidos.
    </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

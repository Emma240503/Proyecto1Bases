<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quiniela')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4" style="max-width: 700px;">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/admin/quinielas}" class="btn btn-sm btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h3 class="fw-bold mb-0">
            <i class="bi bi-list-stars text-primary me-2"></i>
            <span th:if="${accion == 'nueva'}">Nueva Quiniela</span>
            <span th:if="${accion == 'editar'}">Editar Quiniela</span>
        </h3>
    </div>

    <!-- Mensajes flash -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <!--
              POST /admin/quinielas       → crear
              POST /admin/quinielas/{id}  → actualizar
            -->
            <form th:action="${accion == 'nueva'
                              ? '/admin/quinielas'
                              : '/admin/quinielas/' + quiniela.idQuiniela}"
                  th:object="${quiniela}"
                  method="post">

                <div class="row g-3">

                    <div class="col-12">
                        <label class="form-label fw-semibold">Nombre *</label>
                        <input type="text" class="form-control"
                               th:field="*{nombre}" required
                               placeholder="Ej: Liga Champions 2025"/>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Descripción</label>
                        <textarea class="form-control" rows="2"
                                  th:field="*{descripcion}"
                                  placeholder="Descripción breve"></textarea>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Reglas</label>
                        <textarea class="form-control" rows="3"
                                  th:field="*{reglas}"
                                  placeholder="Explica cómo se puntúa..."></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Inicio inscripción</label>
                        <input type="date" class="form-control"
                               th:field="*{fechaInicioInscripcion}"/>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Cierre inscripción</label>
                        <input type="date" class="form-control"
                               th:field="*{fechaCierreInscripcion}"/>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Estado</label>
                        <select class="form-select" th:field="*{estado}">
                            <option value="ABIERTA">ABIERTA</option>
                            <option value="CERRADA">CERRADA</option>
                            <option value="FINALIZADA">FINALIZADA</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Modalidad</label>
                        <input type="text" class="form-control"
                               th:field="*{modalidad}"
                               placeholder="Ej: GRUPAL, INDIVIDUAL"/>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Tipo de puntuación</label>
                        <input type="text" class="form-control"
                               th:field="*{tipoPuntuacion}"
                               placeholder="Ej: EXACTA, RESULTADO"/>
                    </div>

                    <div class="col-12 d-flex gap-2 pt-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>
                            <span th:if="${accion == 'nueva'}">Crear Quiniela</span>
                            <span th:if="${accion == 'editar'}">Guardar Cambios</span>
                        </button>
                        <a th:href="@{/admin/quinielas}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>

                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quinielas')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">
            <i class="bi bi-list-stars text-primary me-2"></i>Quinielas
        </h3>
        <a sec:authorize="hasRole('ADMINISTRADOR')"
           th:href="@{/admin/quinielas/nueva}"
           class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>Nueva Quiniela
        </a>
    </div>

    <!-- Mensajes flash -->
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Tabla de quinielas -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Modalidad</th>
                            <th>Inscripción</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="q : ${quinielas}">
                            <td th:text="${q.idQuiniela}"></td>
                            <td>
                                <strong th:text="${q.nombre}"></strong>
                                <br/>
                                <small class="text-muted" th:text="${q.descripcion}"></small>
                            </td>
                            <td th:text="${q.modalidad}"></td>
                            <td>
                                <span th:if="${q.fechaInicioInscripcion != null}"
                                      th:text="${#temporals.format(q.fechaInicioInscripcion,'dd/MM/yyyy')}"></span>
                                <span th:if="${q.fechaCierreInscripcion != null}"> — </span>
                                <span th:if="${q.fechaCierreInscripcion != null}"
                                      th:text="${#temporals.format(q.fechaCierreInscripcion,'dd/MM/yyyy')}"></span>
                            </td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="'badge-' + ${q.estado}"
                                      th:text="${q.estado}"></span>
                            </td>
                            <td class="text-center">

                                <!-- Botón Ver detalle (ambos roles) -->
                                <a sec:authorize="hasRole('ADMINISTRADOR')"
                                   th:href="@{/admin/quinielas/{id}(id=${q.idQuiniela})}"
                                   class="btn btn-sm btn-outline-info me-1"
                                   title="Ver detalle">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a sec:authorize="hasRole('JUGADOR')"
                                   th:href="@{/jugador/quinielas/{id}(id=${q.idQuiniela})}"
                                   class="btn btn-sm btn-outline-info me-1"
                                   title="Ver partidos">
                                    <i class="bi bi-eye"></i>
                                </a>

                                <!-- Ranking (todos) -->
                                <a th:href="@{/ranking/{id}(id=${q.idQuiniela})}"
                                   class="btn btn-sm btn-outline-warning me-1"
                                   title="Ranking">
                                    <i class="bi bi-trophy"></i>
                                </a>

                                <!-- Solo ADMINISTRADOR: editar / cambiar estado / eliminar -->
                                <a sec:authorize="hasRole('ADMINISTRADOR')"
                                   th:href="@{/admin/quinielas/{id}/editar(id=${q.idQuiniela})}"
                                   class="btn btn-sm btn-outline-secondary me-1"
                                   title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>

                                <!-- Cambiar estado -->
                                <div sec:authorize="hasRole('ADMINISTRADOR')"
                                     class="btn-group me-1" title="Cambiar estado">
                                    <button type="button"
                                            class="btn btn-sm btn-outline-primary dropdown-toggle"
                                            data-bs-toggle="dropdown">
                                        <i class="bi bi-toggles"></i>
                                    </button>
                                    <ul class="dropdown-menu">
                                        <li>
                                            <form th:action="@{/admin/quinielas/{id}/estado(id=${q.idQuiniela})}"
                                                  method="post">
                                                <input type="hidden" name="estado" value="ABIERTA"/>
                                                <button class="dropdown-item text-success" type="submit">ABIERTA</button>
                                            </form>
                                        </li>
                                        <li>
                                            <form th:action="@{/admin/quinielas/{id}/estado(id=${q.idQuiniela})}"
                                                  method="post">
                                                <input type="hidden" name="estado" value="CERRADA"/>
                                                <button class="dropdown-item text-warning" type="submit">CERRADA</button>
                                            </form>
                                        </li>
                                        <li>
                                            <form th:action="@{/admin/quinielas/{id}/estado(id=${q.idQuiniela})}"
                                                  method="post">
                                                <input type="hidden" name="estado" value="FINALIZADA"/>
                                                <button class="dropdown-item text-secondary" type="submit">FINALIZADA</button>
                                            </form>
                                        </li>
                                    </ul>
                                </div>

                                <!-- Eliminar -->
                                <form sec:authorize="hasRole('ADMINISTRADOR')"
                                      th:action="@{/admin/quinielas/{id}/eliminar(id=${q.idQuiniela})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('¿Eliminar esta quiniela?')">
                                    <button class="btn btn-sm btn-outline-danger" type="submit" title="Eliminar">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>

                                <!-- Solo JUGADOR: inscribirse -->
                                <form sec:authorize="hasRole('JUGADOR')"
                                      th:if="${q.estado == 'ABIERTA'}"
                                      th:action="@{/jugador/quinielas/{id}/inscribir(id=${q.idQuiniela})}"
                                      method="post" class="d-inline">
                                    <input type="hidden" name="aceptoReglas" value="true"/>
                                    <button class="btn btn-sm btn-success" type="submit" title="Inscribirse">
                                        <i class="bi bi-person-plus"></i> Inscribirse
                                    </button>
                                </form>

                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(quinielas)}">
                            <td colspan="6" class="text-center text-muted py-4">
                                No hay quinielas disponibles.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Pronóstico')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4" style="max-width: 520px;">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/jugador/quinielas/{id}(id=${quiniela.idQuiniela})}"
           class="btn btn-sm btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h3 class="fw-bold mb-0">
            <i class="bi bi-pencil-square text-primary me-2"></i>Tu Pronóstico
        </h3>
    </div>

    <!-- Info quiniela -->
    <div class="alert alert-light border mb-4">
        <small class="text-muted">Quiniela:</small>
        <strong class="d-block" th:text="${quiniela.nombre}"></strong>
    </div>

    <!-- Info partido -->
    <div class="card border-0 bg-match-dark shadow mb-4">
        <div class="card-body text-center py-4">
            <div class="row align-items-center">
                <div class="col-5 text-end">
                    <h5 class="fw-bold mb-0" th:text="${partido.equipoLocal}"></h5>
                </div>
                <div class="col-2">
                    <span class="fw-bold fs-4">vs</span>
                </div>
                <div class="col-5 text-start">
                    <h5 class="fw-bold mb-0" th:text="${partido.equipoVisitante}"></h5>
                </div>
            </div>
            <small class="mt-2 d-block opacity-75">
                <i class="bi bi-clock me-1"></i>
                <span th:if="${partido.fechaHora != null}"
                      th:text="${#temporals.format(partido.fechaHora, 'dd/MM/yyyy HH:mm')}"></span>
            </small>
        </div>
    </div>

    <!-- Formulario pronóstico -->
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h6 class="text-center text-muted mb-4">
                <i class="bi bi-info-circle me-1"></i>
                Ingresa tu predicción de goles
            </h6>

            <form th:action="@{/jugador/pronosticos}" method="post">

                <input type="hidden" name="quinielaId" th:value="${quiniela.idQuiniela}"/>
                <input type="hidden" name="partidoId" th:value="${partido.idPartido}"/>

                <div class="row g-3 align-items-end">

                    <div class="col-5">
                        <label class="form-label fw-semibold text-center d-block"
                               th:text="${partido.equipoLocal}">Local</label>
                        <input type="number" class="form-control form-control-lg text-center"
                               name="golesLocal" min="0" max="99"
                               placeholder="0" required/>
                    </div>

                    <div class="col-2 text-center pb-2">
                        <span class="fw-bold fs-5 text-muted">—</span>
                    </div>

                    <div class="col-5">
                        <label class="form-label fw-semibold text-center d-block"
                               th:text="${partido.equipoVisitante}">Visitante</label>
                        <input type="number" class="form-control form-control-lg text-center"
                               name="golesVisitante" min="0" max="99"
                               placeholder="0" required/>
                    </div>

                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-send me-2"></i>Guardar Pronóstico
                    </button>
                </div>

            </form>
        </div>
    </div>

    <p class="text-muted small text-center mt-3">
        <i class="bi bi-exclamation-triangle me-1"></i>
        Solo puedes ingresar pronósticos antes de que inicie el partido.
    </p>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

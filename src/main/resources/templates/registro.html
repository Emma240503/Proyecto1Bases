<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Registro')}"></head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">

<div class="card shadow" style="width: 100%; max-width: 520px;">
    <div class="card-header bg-success text-white text-center py-3">
        <h4 class="mb-0">
            <i class="bi bi-person-plus-fill me-2"></i>Crear cuenta
        </h4>
        <small>Únete a QuinielaFútbol — es gratis</small>
    </div>

    <div class="card-body p-4">

        <!-- Mensaje de error flash -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle me-1"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/registro}" th:object="${usuario}" method="post">

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-person-badge me-1"></i>Nombre completo
                </label>
                <input type="text" class="form-control"
                       th:field="*{nombreCompleto}"
                       placeholder="Ej: María García López" required/>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-at me-1"></i>Nombre de usuario
                </label>
                <input type="text" class="form-control"
                       th:field="*{username}"
                       placeholder="Ej: maria123" required/>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-envelope me-1"></i>Correo electrónico
                </label>
                <input type="email" class="form-control"
                       th:field="*{email}"
                       placeholder="correo@ejemplo.com" required/>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">
                    <i class="bi bi-lock me-1"></i>Contraseña
                </label>
                <input type="password" class="form-control"
                       th:field="*{contrasena}"
                       placeholder="Mínimo 6 caracteres" required/>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">
                    <i class="bi bi-calendar-date me-1"></i>Fecha de nacimiento
                </label>
                <input type="date" class="form-control"
                       th:field="*{fechaNacimiento}"/>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2">
                <i class="bi bi-person-check me-1"></i>Crear cuenta
            </button>
        </form>

    </div>

    <div class="card-footer text-center py-3">
        ¿Ya tienes cuenta?
        <a th:href="@{/login}" class="fw-semibold">Inicia sesión</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' — QuinielaFútbol'">QuinielaFútbol</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>
    <style>
        body { background-color: #f5f7fa; }
        .navbar-brand { font-weight: 700; letter-spacing: .5px; }
        .badge-ABIERTA    { background-color: #198754; }
        .badge-CERRADA    { background-color: #ffc107; color:#000; }
        .badge-FINALIZADA { background-color: #6c757d; }
        .badge-PENDIENTE  { background-color: #0dcaf0; color:#000; }
        .badge-FINALIZADO { background-color: #6c757d; }
        .table th { background-color: #e9ecef; }
        .ranking-pos { font-weight:700; font-size:1.1rem; }
    </style>
</head>


<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">

        <!-- Marca -->
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-trophy-fill me-1"></i>QuinielaFútbol
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMain">

            <!-- Menú izquierda -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>

                <!-- ADMINISTRADOR -->
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMINISTRADOR')">
                    <a class="nav-link dropdown-toggle" href="#"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-gear-fill"></i> Administración
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a class="dropdown-item" th:href="@{/admin/quinielas}">
                                <i class="bi bi-list-stars me-1"></i>Quinielas
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/admin/partidos}">
                                <i class="bi bi-calendar3 me-1"></i>Partidos
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- JUGADOR -->
                <li class="nav-item dropdown" sec:authorize="hasRole('JUGADOR')">
                    <a class="nav-link dropdown-toggle" href="#"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-joystick"></i> Jugar
                    </a>
                    <ul class="dropdown-menu">
                        <li>
                            <a class="dropdown-item" th:href="@{/jugador/quinielas}">
                                <i class="bi bi-search me-1"></i>Ver Quinielas
                            </a>
                        </li>
                    </ul>
                </li>

            </ul>

            <!-- Usuario + logout -->
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Usuario</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button class="dropdown-item text-danger" type="submit">
                                    <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>

        </div>
    </div>
</nav>
</body>
</html>
